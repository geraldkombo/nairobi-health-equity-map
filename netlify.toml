[build]
  command = "npm run build"
  publish = "out"

[build.processing]
  skip_processing = true

[dev]
  framework = "next"
  targetPort = 3000

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
